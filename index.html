<!DOCTYPE html>
<html lang="lo">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lao Dictionary Pro - NUOL Prototype</title>
    <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Lao:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --nuol-blue: #003366;
            --accent: #2563eb;
            --bg: #f1f5f9;
        }

        body {
            font-family: 'Noto Sans Lao', sans-serif;
            background: var(--bg);
            margin: 0;
            color: #1e293b;
        }

        header {
            background: var(--nuol-blue);
            color: white;
            padding: 40px 20px;
            text-align: center;
        }

        .container {
            max-width: 1000px;
            margin: -30px auto 40px;
            padding: 0 20px;
        }

        /* Search & Filter Bar */
        .controls {
            background: white;
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
            margin-bottom: 25px;
        }

        .search-group {
            display: flex;
            gap: 10px;
            margin-bottom: 15px;
        }

        input {
            flex: 1;
            padding: 12px 20px;
            border: 1px solid #e2e8f0;
            border-radius: 10px;
            font-size: 1rem;
            font-family: inherit;
        }

        /* Alphabet Browser */
        .alphabet-bar {
            display: flex;
            flex-wrap: wrap;
            gap: 5px;
            padding: 10px 0;
            border-top: 1px solid #f1f5f9;
        }

        .letter-btn {
            background: #f8fafc;
            border: 1px solid #e2e8f0;
            padding: 5px 10px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 0.9rem;
            transition: 0.2s;
        }

        .letter-btn:hover, .letter-btn.active {
            background: var(--nuol-blue);
            color: white;
        }

        /* Main Layout */
        .main-layout {
            display: grid;
            grid-template-columns: 250px 1fr;
            gap: 20px;
        }

        .sidebar {
            background: white;
            padding: 20px;
            border-radius: 12px;
            height: fit-content;
        }

        .category-item {
            display: block;
            padding: 8px 12px;
            margin: 5px 0;
            border-radius: 6px;
            text-decoration: none;
            color: #475569;
            cursor: pointer;
        }

        .category-item:hover { background: #f1f5f9; }
        .category-item.active { background: #dbeafe; color: var(--nuol-blue); font-weight: bold; }

        /* Word List */
        .word-list {
            display: grid;
            gap: 15px;
        }

        .word-card {
            background: white;
            padding: 20px;
            border-radius: 12px;
            border-left: 5px solid #cbd5e1;
            transition: 0.3s;
        }

        .word-card:hover { border-left-color: var(--nuol-blue); transform: translateX(5px); }

        .term-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .pos-tag {
            background: #fee2e2;
            color: #dc2626;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 0.85rem;
            font-weight: bold;
        }

        .meta-info {
            font-size: 0.85rem;
            color: #64748b;
            margin-top: 10px;
            padding-top: 10px;
            border-top: 1px dashed #e2e8f0;
        }

        footer {
            text-align: center;
            padding: 30px;
            font-size: 0.8rem;
            color: #64748b;
        }
    </style>
</head>
<body>

<header>
    <h1 style="margin:0">Lao Dictionary Enterprise</h1>
    <p>ຄະນະອັກສອນສາດ ມຊ (Faculty of Letters, NUOL)</p>
</header>

<div class="container">
    <div class="controls">
        <div class="search-group">
            <input type="text" id="txtSearch" placeholder="ຄົ້ນຫາຄຳສັບ ຫຼື ຄວາມໝາຍ (Full-text)..." oninput="runFilter()">
            <button onclick="resetFilters()" style="padding:0 20px; border-radius:10px; border:none; cursor:pointer">ລ້າງການຄົ້ນຫາ</button>
        </div>
        
        <div class="alphabet-bar" id="alphabetBar">
            </div>
    </div>

    <div class="main-layout">
        <div class="sidebar">
            <h4 style="margin-top:0">ໝວດໝູ່ (Category)</h4>
            <div id="categoryList">
                <div class="category-item active" onclick="setCategory('All')">ທັງໝົດ</div>
                <div class="category-item" onclick="setCategory('ກົດໝາຍ')">ກົດໝາຍ (Legal)</div>
                <div class="category-item" onclick="setCategory('ວັນນະຄະດີ')">ວັນນະຄະດີ (Literature)</div>
                <div class="category-item" onclick="setCategory('ທົ່ວໄປ')">ທົ່ວໄປ (General)</div>
            </div>
        </div>

        <div class="word-list" id="wordList">
            </div>
    </div>
</div>

<footer>
    <p>© 2026 Faculty of Letters, National University of Laos. | Open-Source Prototype for Lao People.</p>
</footer>

    { term: "ນິທານ", pos: "ນ.", def: "ເລື່ອງ, ເລື່ອງເລົ່າທີ່ພື້ນ ດັ່ງ ນິທານຊຽງໝ້ຽງ, ນິທານເຜີຜີກອງກອຍ ເປັນຕົ້ນ.", ety: "ປ. ນິທານະ", cat: "ວັນນະຄະດີ", letter: "ນ" }
];

    const laoAlphabet = ["ກ", "ຂ", "ຄ", "ງ", "ຈ", "ສ", "ຊ", "ຍ", "ດ", "ຕ", "ຖ", "ທ", "ນ", "ບ", "ປ", "ຜ", "ຝ", "ພ", "ຟ", "ມ", "ຢ", "ລ", "ວ", "ຫ", "ອ", "ຮ"];
    
    let currentCategory = 'All';
    let currentLetter = '';

    // Initialize Alphabet Bar
    const alphaBar = document.getElementById('alphabetBar');
    laoAlphabet.forEach(l => {
        const btn = document.createElement('div');
        btn.className = 'letter-btn';
        btn.innerText = l;
        btn.onclick = () => setLetter(l, btn);
        alphaBar.appendChild(btn);
    });

    function setLetter(l, el) {
        document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
        if(currentLetter === l) {
            currentLetter = '';
        } else {
            currentLetter = l;
            el.classList.add('active');
        }
        runFilter();
    }

    function setCategory(cat) {
        currentCategory = cat;
        document.querySelectorAll('.category-item').forEach(i => {
            i.classList.remove('active');
            if(i.innerText.includes(cat) || (cat==='All' && i.innerText==='ທັງໝົດ')) i.classList.add('active');
        });
        runFilter();
    }

    function runFilter() {
        const search = document.getElementById('txtSearch').value.toLowerCase();
        const list = document.getElementById('wordList');

        const filtered = dictionary.filter(item => {
            const matchesSearch = item.term.includes(search) || item.def.includes(search);
            const matchesCat = currentCategory === 'All' || item.cat === currentCategory;
            const matchesLetter = currentLetter === '' || item.letter === currentLetter;
            return matchesSearch && matchesCat && matchesLetter;
        });

        if(filtered.length === 0) {
            list.innerHTML = `<div style="padding:40px; text-align:center; color:#94a3b8">ບໍ່ພົບຂໍ້ມູນໃນໝວດໝູ່ນີ້</div>`;
            return;
        }

        list.innerHTML = filtered.map(item => `
            <div class="word-card">
                <div class="term-header">
                    <h2 style="margin:0; color:var(--nuol-blue)">${item.term}</h2>
                    <span class="pos-tag">${item.pos}</span>
                </div>
                <p style="margin:10px 0; line-height:1.6">${item.def}</p>
                <div class="meta-info">
                    <span>📁 ໝວດໝູ່: ${item.cat}</span> | 
                    <span>📜 ທີ່ມາ: ${item.ety}</span>
                </div>
            </div>
        `).join('');
    }

    function resetFilters() {
        document.getElementById('txtSearch').value = '';
        currentLetter = '';
        currentCategory = 'All';
        document.querySelectorAll('.letter-btn').forEach(b => b.classList.remove('active'));
        setCategory('All');
        runFilter();
    }

    // Load initial data
    runFilter();
</script>

</body>
</html>
